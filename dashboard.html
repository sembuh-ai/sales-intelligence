<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sales Intelligence Engine — Deal Health Monitor</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: #0F172A;
    color: #E2E8F0;
    min-height: 100vh;
  }

  .header {
    background: linear-gradient(135deg, #0F172A 0%, #1E293B 100%);
    border-bottom: 1px solid #334155;
    padding: 20px 32px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .header-left { display: flex; align-items: center; gap: 16px; }
  .logo {
    width: 40px; height: 40px; background: #3B82F6; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 800; font-size: 18px; color: white;
  }
  .header-title { font-size: 20px; font-weight: 700; color: #F8FAFC; }
  .header-subtitle { font-size: 13px; color: #94A3B8; margin-top: 2px; }
  .header-right { display: flex; align-items: center; gap: 12px; }
  .badge {
    padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 600;
    background: rgba(59,130,246,0.15); color: #60A5FA; border: 1px solid rgba(59,130,246,0.3);
  }
  .badge-live {
    background: rgba(5,150,105,0.15); color: #34D399; border: 1px solid rgba(5,150,105,0.3);
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
  .timestamp { font-size: 12px; color: #64748B; }
  .sync-btn {
    padding: 6px 16px; border-radius: 8px; font-size: 12px; font-weight: 600;
    background: #3B82F6; color: white; border: none; cursor: pointer;
    transition: background 0.2s;
  }
  .sync-btn:hover { background: #2563EB; }
  .sync-btn:disabled { background: #475569; cursor: not-allowed; }

  .main { padding: 24px 32px; max-width: 1400px; margin: 0 auto; }

  .kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
  .kpi-card {
    background: #1E293B; border: 1px solid #334155; border-radius: 12px;
    padding: 20px; position: relative; overflow: hidden;
  }
  .kpi-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; }
  .kpi-card.blue::before { background: #3B82F6; }
  .kpi-card.green::before { background: #059669; }
  .kpi-card.amber::before { background: #F59E0B; }
  .kpi-card.red::before { background: #EF4444; }
  .kpi-label { font-size: 12px; color: #94A3B8; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }
  .kpi-value { font-size: 32px; font-weight: 800; margin: 8px 0 4px; color: #F8FAFC; }
  .kpi-sub { font-size: 13px; color: #64748B; }

  .content-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
  .content-grid.full { grid-template-columns: 1fr; }

  .card {
    background: #1E293B; border: 1px solid #334155; border-radius: 12px;
    padding: 24px; position: relative;
  }
  .card-title {
    font-size: 14px; font-weight: 700; color: #F8FAFC; margin-bottom: 16px;
    text-transform: uppercase; letter-spacing: 0.5px;
    display: flex; align-items: center; gap: 8px;
  }
  .card-title .icon { font-size: 16px; }

  .deal-table { width: 100%; border-collapse: separate; border-spacing: 0; }
  .deal-table th {
    text-align: left; padding: 10px 14px; font-size: 11px; font-weight: 600;
    color: #94A3B8; text-transform: uppercase; letter-spacing: 1px;
    border-bottom: 1px solid #334155; background: #1E293B;
  }
  .deal-table td {
    padding: 14px; font-size: 13px; border-bottom: 1px solid rgba(51,65,85,0.5);
    vertical-align: middle;
  }
  .deal-table tr:hover td { background: rgba(59,130,246,0.05); }
  .deal-name { font-weight: 600; color: #F8FAFC; }
  .deal-stage {
    display: inline-block; padding: 4px 10px; border-radius: 6px;
    font-size: 11px; font-weight: 600;
  }
  .stage-piloting { background: rgba(102,204,255,0.15); color: #66CCFF; }
  .stage-first-meeting { background: rgba(87,155,252,0.15); color: #579BFC; }
  .stage-solutioning { background: rgba(161,227,246,0.15); color: #A1E3F6; }
  .stage-waiting { background: rgba(156,211,38,0.15); color: #9CD326; }
  .stage-lost { background: rgba(223,47,74,0.15); color: #DF2F4A; }
  .stage-won { background: rgba(0,200,117,0.15); color: #00C875; }
  .stage-open { background: rgba(121,133,148,0.15); color: #94A3B8; }

  .health-score {
    display: inline-flex; align-items: center; justify-content: center;
    width: 44px; height: 44px; border-radius: 50%; font-size: 14px; font-weight: 800;
  }
  .score-green { background: rgba(5,150,105,0.15); color: #34D399; border: 2px solid #059669; }
  .score-amber { background: rgba(245,158,11,0.15); color: #FBBF24; border: 2px solid #F59E0B; }
  .score-red { background: rgba(239,68,68,0.15); color: #F87171; border: 2px solid #EF4444; }
  .score-dead { background: rgba(100,116,139,0.15); color: #94A3B8; border: 2px solid #64748B; }

  .status-badge {
    display: inline-block; padding: 3px 10px; border-radius: 12px;
    font-size: 11px; font-weight: 600;
  }
  .status-healthy { background: rgba(5,150,105,0.15); color: #34D399; }
  .status-at-risk { background: rgba(245,158,11,0.15); color: #FBBF24; }
  .status-critical { background: rgba(239,68,68,0.15); color: #F87171; }
  .status-lost { background: rgba(100,116,139,0.15); color: #94A3B8; }

  .reason { color: #94A3B8; font-size: 12px; line-height: 1.5; max-width: 320px; }

  .chart-container-sm { position: relative; height: 200px; }

  .pipeline-stages { display: flex; flex-direction: column; gap: 12px; }
  .pipeline-row { display: flex; align-items: center; gap: 12px; }
  .pipeline-label { font-size: 12px; color: #94A3B8; width: 140px; text-align: right; flex-shrink: 0; }
  .pipeline-bar-bg {
    flex: 1; height: 28px; background: rgba(51,65,85,0.4); border-radius: 6px;
    overflow: hidden; position: relative;
  }
  .pipeline-bar {
    height: 100%; border-radius: 6px; display: flex; align-items: center;
    padding-left: 10px; font-size: 11px; font-weight: 700; color: white;
    transition: width 1s ease;
  }
  .pipeline-count {
    font-size: 12px; color: #64748B; width: 60px; text-align: right; flex-shrink: 0;
  }

  .action-list { display: flex; flex-direction: column; gap: 12px; }
  .action-item {
    display: flex; gap: 12px; padding: 12px; border-radius: 8px;
    background: rgba(51,65,85,0.3); border-left: 3px solid;
  }
  .action-item.urgent { border-left-color: #EF4444; }
  .action-item.warning { border-left-color: #F59E0B; }
  .action-item.info { border-left-color: #3B82F6; }
  .action-priority {
    font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px;
    margin-bottom: 4px;
  }
  .action-priority.urgent { color: #F87171; }
  .action-priority.warning { color: #FBBF24; }
  .action-priority.info { color: #60A5FA; }
  .action-text { font-size: 13px; color: #E2E8F0; line-height: 1.4; }
  .action-deal { font-size: 11px; color: #64748B; margin-top: 4px; }

  .footer {
    padding: 16px 32px; text-align: center; font-size: 11px; color: #475569;
    border-top: 1px solid #1E293B;
  }
  .footer a { color: #3B82F6; text-decoration: none; }

  .loading {
    display: flex; align-items: center; justify-content: center;
    min-height: 200px; color: #64748B; font-size: 14px;
  }

  /* Action History */
  .history-item {
    display: flex; align-items: flex-start; gap: 14px; padding: 14px;
    border-radius: 8px; background: rgba(51,65,85,0.3);
    border-bottom: 1px solid rgba(51,65,85,0.4);
  }
  .history-item:last-child { border-bottom: none; }
  .history-icon {
    width: 36px; height: 36px; border-radius: 8px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center; font-size: 16px;
  }
  .history-icon.pending { background: rgba(245,158,11,0.15); }
  .history-icon.done { background: rgba(5,150,105,0.15); }
  .history-body { flex: 1; min-width: 0; }
  .history-deal { font-size: 13px; font-weight: 600; color: #F8FAFC; }
  .history-desc { font-size: 12px; color: #94A3B8; margin-top: 2px; line-height: 1.4; }
  .history-meta { font-size: 11px; color: #64748B; margin-top: 6px; display: flex; gap: 12px; flex-wrap: wrap; }
  .history-meta a { color: #60A5FA; text-decoration: none; }
  .history-meta a:hover { text-decoration: underline; }
  .history-badge {
    display: inline-block; padding: 2px 8px; border-radius: 10px;
    font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;
  }
  .history-badge.pending { background: rgba(245,158,11,0.15); color: #FBBF24; }
  .history-badge.done { background: rgba(5,150,105,0.15); color: #34D399; }
  .mark-done-btn {
    padding: 3px 10px; border-radius: 6px; font-size: 11px; font-weight: 600;
    background: rgba(59,130,246,0.15); color: #60A5FA; border: 1px solid rgba(59,130,246,0.3);
    cursor: pointer; transition: background 0.2s;
  }
  .mark-done-btn:hover { background: rgba(59,130,246,0.3); }
  .history-list { display: flex; flex-direction: column; gap: 8px; max-height: 400px; overflow-y: auto; }
  .history-empty { text-align: center; padding: 32px; color: #64748B; font-size: 13px; }

  @media (max-width: 1024px) {
    .kpi-grid { grid-template-columns: repeat(2, 1fr); }
    .content-grid { grid-template-columns: 1fr; }
  }
  @media (max-width: 640px) {
    .kpi-grid { grid-template-columns: 1fr; }
    .main { padding: 16px; }
    .header { padding: 16px; flex-wrap: wrap; gap: 12px; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="logo">S</div>
    <div>
      <div class="header-title">Sales Intelligence Engine</div>
      <div class="header-subtitle">Deal Health Monitor & Pipeline Analytics</div>
    </div>
  </div>
  <div class="header-right">
    <span class="badge">Sembuh AI</span>
    <span class="badge badge-live" id="liveBadge">● Live</span>
    <span class="timestamp" id="syncTime">Last sync: —</span>
    <button class="sync-btn" id="syncBtn" onclick="syncData()">Sync Now</button>
    <button class="sync-btn" id="pipelineBtn" onclick="runPipeline()" style="background:#059669;">Run Pipeline</button>
  </div>
</div>

<div class="main" id="dashboard">
  <div class="loading" id="loadingMsg">Loading dashboard data...</div>
</div>

<div class="footer">
  Powered by <a href="#">Sembuh AI</a> — Sales Intelligence Engine &nbsp;|&nbsp; Built with Claude (Anthropic) + Genspark &nbsp;|&nbsp; Push to Prod Hackathon 2026
</div>

<script>
const API_BASE = window.location.origin;
let revenueChart = null;
let healthChart = null;

function fmtMoney(v) {
  if (v >= 1000) return '$' + (v/1000).toFixed(0) + 'K';
  return '$' + v.toLocaleString();
}

function stageClass(stage) {
  const s = stage.toLowerCase();
  if (s.includes('pilot')) return 'stage-piloting';
  if (s.includes('first meeting')) return 'stage-first-meeting';
  if (s.includes('solution')) return 'stage-solutioning';
  if (s.includes('waiting') || s.includes('won')) return 'stage-waiting';
  if (s === 'lost') return 'stage-lost';
  if (s === 'won' || s.includes('implementation done')) return 'stage-won';
  return 'stage-open';
}

function scoreClass(score, status) {
  if (status === 'Lost') return 'score-dead';
  if (score >= 80) return 'score-green';
  if (score >= 50) return 'score-amber';
  return 'score-red';
}

function statusClass(status) {
  return 'status-' + status.toLowerCase().replace(/\s+/g, '-');
}

function priorityLabel(p) {
  if (p === 'urgent') return 'Urgent';
  if (p === 'warning') return 'Action Needed';
  return 'On Track';
}

const STAGE_COLORS = {
  'First Meeting Done': '#579BFC',
  'Piloting': '#66CCFF',
  'Solutioning': '#A1E3F6',
  'Waiting Confirmation': '#9CD326',
  '[Won] Waiting Signature': '#00C875',
  'Won': '#00C875',
  'Implementation Done': '#00C875',
  'Lost': '#DF2F4A',
  'Open': '#94A3B8',
};

function stageColor(stage) {
  return STAGE_COLORS[stage] || '#579BFC';
}

function renderDashboard(data) {
  const k = data.kpi;
  const el = document.getElementById('dashboard');

  el.innerHTML = `
    <!-- KPI Cards -->
    <div class="kpi-grid">
      <div class="kpi-card blue">
        <div class="kpi-label">Total Pipeline Value</div>
        <div class="kpi-value">$${k.total_pipeline.toLocaleString()}</div>
        <div class="kpi-sub">${k.active_deals} active deals</div>
      </div>
      <div class="kpi-card green">
        <div class="kpi-label">Weighted Pipeline</div>
        <div class="kpi-value">$${k.weighted_pipeline.toLocaleString()}</div>
        <div class="kpi-sub">${k.conversion_probability}% conversion probability</div>
      </div>
      <div class="kpi-card amber">
        <div class="kpi-label">Deals at Risk</div>
        <div class="kpi-value">${k.at_risk_count}</div>
        <div class="kpi-sub">Require immediate attention</div>
      </div>
      <div class="kpi-card red">
        <div class="kpi-label">Critical Alerts</div>
        <div class="kpi-value">${k.critical_count}</div>
        <div class="kpi-sub">${k.critical_subtitle || 'No critical deals'}</div>
      </div>
    </div>

    <!-- Deal Health Table -->
    <div class="content-grid full">
      <div class="card">
        <div class="card-title"><span class="icon">🏥</span> Deal Health Scores</div>
        <table class="deal-table">
          <thead>
            <tr><th>Deal</th><th>Stage</th><th>Value</th><th>Score</th><th>Status</th><th>AI Assessment</th></tr>
          </thead>
          <tbody>
            ${data.deals.map(d => `
              <tr>
                <td class="deal-name">${d.name}</td>
                <td><span class="deal-stage ${stageClass(d.stage)}">${d.stage}</span></td>
                <td>$${d.value.toLocaleString()}</td>
                <td><span class="health-score ${scoreClass(d.score, d.status)}">${d.status === 'Lost' ? '—' : d.score}</span></td>
                <td><span class="status-badge ${statusClass(d.status)}">${d.status}</span></td>
                <td class="reason">${d.reasons.length ? d.reasons.join('. ') + '.' : 'On track.'}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
    </div>

    <!-- Charts Row -->
    <div class="content-grid">
      <!-- Pipeline by Stage -->
      <div class="card">
        <div class="card-title"><span class="icon">📊</span> Pipeline by Stage</div>
        <div class="pipeline-stages">
          ${data.pipeline_stages.map(s => `
            <div class="pipeline-row">
              <span class="pipeline-label">${s.stage}</span>
              <div class="pipeline-bar-bg">
                <div class="pipeline-bar" style="width: ${Math.max(s.pct, 8)}%; background: ${stageColor(s.stage)};">${fmtMoney(s.value)}</div>
              </div>
              <span class="pipeline-count">${s.count} deal${s.count !== 1 ? 's' : ''}</span>
            </div>
          `).join('')}
        </div>
      </div>

      <!-- AI Actions -->
      <div class="card">
        <div class="card-title"><span class="icon">⚡</span> AI-Recommended Actions</div>
        <div class="action-list">
          ${data.actions.map(a => `
            <div class="action-item ${a.priority}">
              <div>
                <div class="action-priority ${a.priority}">${priorityLabel(a.priority)}</div>
                <div class="action-text">${a.text}</div>
                <div class="action-deal">${a.deal}</div>
              </div>
            </div>
          `).join('')}
        </div>
      </div>
    </div>

    <!-- Bottom Row -->
    <div class="content-grid">
      <div class="card">
        <div class="card-title"><span class="icon">💰</span> Weighted Revenue Forecast</div>
        <div class="chart-container-sm"><canvas id="revenueChart"></canvas></div>
      </div>
      <div class="card">
        <div class="card-title"><span class="icon">🎯</span> Portfolio Health Distribution</div>
        <div class="chart-container-sm"><canvas id="healthChart"></canvas></div>
      </div>
    </div>

    <!-- AI Narrative -->
    <div class="content-grid full">
      <div class="card" style="border-left: 3px solid #3B82F6;">
        <div class="card-title"><span class="icon">🧠</span> AI-Generated Pipeline Narrative</div>
        <p style="font-size: 14px; line-height: 1.8; color: #CBD5E1;">${data.narrative}</p>
      </div>
    </div>

    <!-- Action History -->
    <div class="content-grid full">
      <div class="card">
        <div class="card-title"><span class="icon">📋</span> Pipeline Action History</div>
        <div class="history-list" id="historyList">
          <div class="history-empty">Loading actions...</div>
        </div>
      </div>
    </div>
  `;

  // Revenue chart
  const rCtx = document.getElementById('revenueChart').getContext('2d');
  if (revenueChart) revenueChart.destroy();
  revenueChart = new Chart(rCtx, {
    type: 'bar',
    data: {
      labels: data.revenue_forecast.labels,
      datasets: [
        {
          label: 'Deal Value', data: data.revenue_forecast.deal_values,
          backgroundColor: 'rgba(59,130,246,0.2)', borderColor: 'rgba(59,130,246,0.5)',
          borderWidth: 1, borderRadius: 4,
        },
        {
          label: 'Weighted Value', data: data.revenue_forecast.weighted_values,
          backgroundColor: 'rgba(52,211,153,0.4)', borderColor: 'rgba(52,211,153,0.7)',
          borderWidth: 1, borderRadius: 4,
        }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { position: 'top', labels: { color: '#94A3B8', font: { size: 11 }, boxWidth: 12, padding: 16 } } },
      scales: {
        x: { ticks: { color: '#64748B', font: { size: 10 } }, grid: { display: false } },
        y: { ticks: { color: '#64748B', font: { size: 10 }, callback: v => '$' + (v/1000) + 'K' }, grid: { color: 'rgba(51,65,85,0.4)' } }
      }
    }
  });

  // Health doughnut
  const hCtx = document.getElementById('healthChart').getContext('2d');
  if (healthChart) healthChart.destroy();
  healthChart = new Chart(hCtx, {
    type: 'doughnut',
    data: {
      labels: data.health_distribution.labels,
      datasets: [{
        data: data.health_distribution.values,
        backgroundColor: ['#059669', '#F59E0B', '#EF4444', '#475569'],
        borderColor: '#1E293B', borderWidth: 3,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false, cutout: '65%',
      plugins: { legend: { position: 'right', labels: { color: '#94A3B8', font: { size: 11 }, padding: 12, boxWidth: 12 } } }
    }
  });

  // Update sync time
  if (data.synced_at) {
    const d = new Date(data.synced_at);
    document.getElementById('syncTime').textContent = 'Last sync: ' + d.toLocaleString('en-SG', {
      month: 'short', day: 'numeric', year: 'numeric', hour: '2-digit', minute: '2-digit'
    });
  }
}

function renderActionHistory(actions) {
  const el = document.getElementById('historyList');
  if (!el) return;

  if (!actions.length) {
    el.innerHTML = '<div class="history-empty">No pipeline actions yet. Run <code>python app.py pipeline</code> to generate.</div>';
    return;
  }

  el.innerHTML = actions.map(a => {
    const isPending = a.status === 'pending';
    const icon = isPending ? '⏳' : '✅';
    const ts = new Date(a.created_at).toLocaleString('en-SG', {
      month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit'
    });

    const links = [];
    if (a.draft_link) links.push(`<a href="${a.draft_link}" target="_blank">📧 Email Draft</a>`);
    if (a.drive_link) links.push(`<a href="${a.drive_link}" target="_blank">📁 Google Drive</a>`);
    if (a.mom_file) links.push(`<span>📄 MoM: ${a.mom_file}</span>`);
    if (a.discount_pct) links.push(`<span>🏷️ ${a.discount_pct}% discount</span>`);

    const files = a.files_generated || [];
    const fileStr = files.length ? files.map(f => `<code>${f}</code>`).join(', ') : '';

    const markBtn = isPending
      ? `<button class="mark-done-btn" onclick="markDone(${a.id})">Mark Done</button>`
      : '';

    return `
      <div class="history-item">
        <div class="history-icon ${a.status}">${icon}</div>
        <div class="history-body">
          <div style="display:flex; align-items:center; gap:8px; flex-wrap:wrap;">
            <span class="history-deal">${a.deal_name}</span>
            <span class="history-badge ${a.status}">${a.status}</span>
            ${markBtn}
          </div>
          <div class="history-desc">${a.description}</div>
          ${fileStr ? `<div class="history-desc" style="margin-top:4px;">Files: ${fileStr}</div>` : ''}
          <div class="history-meta">
            <span>${ts}</span>
            ${links.join('')}
          </div>
        </div>
      </div>
    `;
  }).join('');
}

async function markDone(actionId) {
  try {
    await fetch(API_BASE + '/api/actions/' + actionId + '/done', { method: 'POST' });
    await loadActionHistory();
  } catch (e) {
    alert('Error: ' + e.message);
  }
}

async function loadActionHistory() {
  try {
    const resp = await fetch(API_BASE + '/api/actions');
    const data = await resp.json();
    renderActionHistory(data.actions || []);
  } catch (e) {
    const el = document.getElementById('historyList');
    if (el) el.innerHTML = '<div class="history-empty">Failed to load actions.</div>';
  }
}

async function loadDashboard() {
  try {
    const resp = await fetch(API_BASE + '/api/dashboard');
    if (resp.status === 404) {
      document.getElementById('loadingMsg').textContent = 'No data yet. Click "Sync Now" to fetch from Monday.com.';
      return;
    }
    const data = await resp.json();
    renderDashboard(data);
    await loadActionHistory();
  } catch (e) {
    document.getElementById('dashboard').innerHTML = `<div class="loading">Error loading data: ${e.message}</div>`;
  }
}

async function syncData() {
  const btn = document.getElementById('syncBtn');
  btn.disabled = true;
  btn.textContent = 'Syncing...';
  try {
    const resp = await fetch(API_BASE + '/api/sync', { method: 'POST' });
    const result = await resp.json();
    if (result.status === 'ok') {
      await loadDashboard();
    } else {
      alert('Sync error: ' + result.message);
    }
  } catch (e) {
    alert('Sync failed: ' + e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Sync Now';
  }
}

async function runPipeline() {
  const dealName = prompt('Enter deal name filter (e.g. "Sentosa"), or leave empty for all deals:');
  if (dealName === null) return; // cancelled

  const btn = document.getElementById('pipelineBtn');
  btn.disabled = true;
  btn.textContent = 'Running...';
  try {
    const params = new URLSearchParams();
    if (dealName.trim()) params.set('deal', dealName.trim());

    const resp = await fetch(API_BASE + '/api/pipeline?' + params.toString());
    const result = await resp.json();
    if (result.status === 'ok') {
      const summary = result.steps.join('\n• ');
      alert(`Pipeline complete!\n\n• ${summary}\n\nDeals: ${result.deals_processed}\nFiles: ${result.files_generated}`);
      await loadDashboard();
    } else {
      alert('Pipeline error: ' + result.message);
    }
  } catch (e) {
    alert('Pipeline failed: ' + e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Run Pipeline';
  }
}

// Load on page open
loadDashboard();
</script>
